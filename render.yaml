# Render Blueprint — deploy OptiCrop with one click.
# In Render: New + -> Blueprint -> connect this repo -> Apply.
services:
  - type: web
    name: opticrop
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SECRET_KEY
        generateValue: true   # Render generates a secure random value
