# Render Blueprint — deploy OptiCrop with one click.
# In Render: New + -> Blueprint -> connect this repo -> Apply.
services:
  - type: web
    name: opticrop
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Single worker + threads keeps memory within the free tier's 512 MB
    # (each worker loads scikit-learn + the model; multiple workers OOM-loop).
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SECRET_KEY
        generateValue: true   # Render generates a secure random value
