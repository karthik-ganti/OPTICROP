{% extends "base.html" %}
{% block title %}Login — OptiCrop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card oc-auth-card border-0 shadow">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="oc-auth-icon mx-auto mb-3"><i class="bi bi-flower1"></i></div>
                    <h4 class="fw-bold mb-1">Welcome Back</h4>
                    <p class="text-muted small mb-0">Log in to get crop recommendations.</p>
                </div>

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="email">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="you@example.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="password">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Your password" required>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn oc-btn-primary btn-lg fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                        </button>
                    </div>
                </form>

                <p class="text-center text-muted small mt-4 mb-0">
                    Don't have an account?
                    <a href="{{ url_for('register') }}" class="text-success fw-semibold text-decoration-none">Register</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
