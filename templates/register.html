{% extends "base.html" %}
{% block title %}Register — OptiCrop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card oc-auth-card border-0 shadow">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="oc-auth-icon mx-auto mb-3"><i class="bi bi-person-plus"></i></div>
                    <h4 class="fw-bold mb-1">Create Your Account</h4>
                    <p class="text-muted small mb-0">Join OptiCrop and start optimizing your harvest.</p>
                </div>

                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="name">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="name" name="name"
                                   placeholder="Your name" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="email">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="you@example.com" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="password">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Choose a password" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="role">I am a...</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-briefcase"></i></span>
                            <select class="form-select" id="role" name="role">
                                <option value="Farmer" selected>Farmer</option>
                                <option value="Agricultural Researcher">Agricultural Researcher</option>
                                <option value="Agribusiness Professional">Agribusiness Professional</option>
                                <option value="Policymaker">Policymaker</option>
                                <option value="Admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn oc-btn-primary btn-lg fw-semibold">
                            <i class="bi bi-check-circle me-2"></i>Create Account
                        </button>
                    </div>
                </form>

                <p class="text-center text-muted small mt-4 mb-0">
                    Already have an account?
                    <a href="{{ url_for('login') }}" class="text-success fw-semibold text-decoration-none">Log In</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
